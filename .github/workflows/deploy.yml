name: Deploy React Portfolio to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install and build portfolio
        working-directory: suri
        run: |
          npm install
          npm run build

      - name: Install and build Sudoku game
        working-directory: sudoku-game
        run: |
          npm install
          npm run build

      - name: Copy Sudoku build into portfolio
        run: cp -r sudoku-game/build suri/build/sudoku

      - name: Configure Git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Deploy to GitHub Pages
        working-directory: suri
        env:
          GH_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
        run: npx gh-pages -d build -b gh-pages --cname venkatasaikiransuri.online -r https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
